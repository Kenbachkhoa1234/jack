<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Nhận Thưởng</title>
<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    background: white;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    width: 360px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
}

button {
    background: linear-gradient(45deg, #ff4b5c, #ff1e3c);
    border: none;
    padding: 15px 25px;
    font-size: 18px;
    color: white;
    border-radius: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="card">
    <h1>🎉 Chúc mừng!</h1>
    <p>Bạn trúng iPhone 15 Pro Max</p>
    <button onclick="go()">Nhận thưởng</button>
</div>

<script>
function go(){
    window.location.href="bank.html";
}
</script>

</body>
</html>
